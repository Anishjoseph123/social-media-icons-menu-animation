<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Icon Hover</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link
      rel="shortcut icon"
      href="../favicon_io/android-chrome-192x192.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <ul>
      <li style="--i: 6; --clr: #1877f2">
        <a href="#">
          <span><i class="fa-brands fa-facebook"></i></span>Facebook</a
        >
      </li>
      <li style="--i: 5; --clr: #25d366">
        <a href="#">
          <span><i class="fa-brands fa-whatsapp"></i></span>WhatsApp</a
        >
      </li>
      <li style="--i: 4; --clr: #1da1f2">
        <a href="#">
          <span><i class="fa-brands fa-twitter"></i></span>Twitter</a
        >
      </li>
      <li style="--i: 3; --clr: #c32aa3">
        <a href="#">
          <span><i class="fa-brands fa-instagram"></i></span>Instagram</a
        >
      </li>
      <li style="--i: 2; --clr: #ff0000">
        <a href="#"
          ><span><i class="fa-brands fa-youtube"></i></span>YouTube</a
        >
      </li>
      <li style="--i: 1; --clr: #0a66c2">
        <a href="#">
          <span><i class="fa-brands fa-linkedin"></i></span>LinkedIn</a
        >
      </li>
    </ul>
  </body>
</html>
